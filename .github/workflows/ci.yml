name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  check_source_branch:
    name: Check source branch
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Only dev can merge into main
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ PRs to main must come from the 'dev' branch."
            echo "   Source branch: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source branch is 'dev' — allowed."

  lint_and_build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
